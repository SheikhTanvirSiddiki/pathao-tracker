services:
  # Python Flask API Server
  - type: web
    name: pathao-tracker-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && playwright install chromium --with-deps"
    startCommand: "gunicorn server:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.16
    healthCheckPath: /
    region: oregon
